<style>
:root{--bg:#080d12;--teal:#5cbfb0;--teal-dim:#3a8a7f;--teal-glow:rgba(92,191,176,0.12);--gold:#c9a96e;--txt:#e8e4dc;--txt2:#8fa0b0;--muted:#4a5a6a;--border:rgba(92,191,176,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Inter',sans-serif;font-weight:300;color:var(--txt);}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:300;transition:opacity .7s;}
.ld-logo{font-family:'Cinzel',serif;font-size:32px;letter-spacing:.35em;animation:fu .7s .2s both;}
.ld-sub{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.22em;color:var(--teal);font-style:italic;animation:fu .7s .4s both;}
.ld-bar{width:160px;height:1px;background:rgba(92,191,176,.12);overflow:hidden;animation:fu .4s .6s both;}
.ld-fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal-dim),var(--teal));animation:bf 2.5s .7s ease-out forwards;}
.ld-err{font-family:'Cormorant Garamond',serif;font-size:11px;color:#c06060;font-style:italic;display:none;margin-top:6px;text-align:center;max-width:260px;}
@keyframes bf{to{width:100%;}}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
header{position:fixed;top:0;left:0;right:0;z-index:100;height:62px;background:linear-gradient(180deg,rgba(8,13,18,.98) 0%,rgba(8,13,18,.7) 100%);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;}
.lw{display:flex;align-items:center;gap:13px;}
.lt{font-family:'Cinzel',serif;font-size:19px;font-weight:600;letter-spacing:.28em;}
.ls{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.2em;color:var(--teal);font-style:italic;display:block;margin-top:2px;}
nav{display:flex;align-items:center;gap:22px;}
.nl{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.1em;color:var(--txt2);cursor:pointer;transition:color .2s;text-decoration:none;}
.nl:hover{color:var(--teal);}
.nc{border:1px solid var(--teal-dim);color:var(--teal);padding:6px 16px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;transition:all .25s;cursor:pointer;}
.nc:hover{background:var(--teal-glow);border-color:var(--teal);}
#globe-wrap{position:fixed;inset:0;top:62px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#globe-svg{overflow:visible;cursor:grab;}
#globe-svg:active{cursor:grabbing;}
.glow-bg{position:absolute;width:640px;height:640px;background:radial-gradient(circle,rgba(92,191,176,.065) 0%,transparent 68%);pointer-events:none;border-radius:50%;}
.graticule{fill:none;stroke:rgba(255,255,255,0.04);stroke-width:.5;}
.country-path{fill:#162434;stroke:#1e3248;stroke-width:.4;cursor:pointer;transition:fill .15s,stroke .15s;}
.country-path:hover{fill:#1f3a52;stroke:rgba(92,191,176,.3);}
.country-path.has-data{fill:#183040;stroke:rgba(92,191,176,.22);}
.country-path.has-data:hover{fill:#214d65;stroke:rgba(92,191,176,.5);}
.country-path.active{fill:#14352f!important;stroke:#5cbfb0!important;stroke-width:.9;}
.arctic-ice{fill:rgba(200,230,240,0.18);stroke:rgba(180,220,235,0.2);stroke-width:.5;}
.ocean-sphere{fill:url(#oceanGrad);}
.data-dot{cursor:pointer;}
.data-dot circle.outer{fill:none;stroke:rgba(92,191,176,.35);stroke-width:1;}
.data-dot circle.inner{fill:#5cbfb0;}
.data-dot:hover circle.inner{fill:#7dd8cc;}
#tip{position:fixed;background:rgba(6,11,17,.96);border:1px solid var(--border);padding:7px 14px;font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:.04em;opacity:0;transition:opacity .12s;pointer-events:none;white-space:nowrap;z-index:200;}
#panel{position:fixed;right:0;top:62px;bottom:0;width:0;overflow:hidden;transition:width .38s cubic-bezier(.4,0,.2,1);background:rgba(7,12,18,.97);border-left:1px solid var(--border);z-index:150;backdrop-filter:blur(24px);}
#panel.open{width:min(400px,100vw);}
.pi{width:min(400px,100vw);height:100%;display:flex;flex-direction:column;}
.ph{padding:24px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pr{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.22em;color:var(--teal);text-transform:uppercase;margin-bottom:4px;}
.pn{font-family:'Cinzel',serif;font-size:18px;letter-spacing:.1em;font-weight:400;margin-bottom:9px;}
.pm{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.tag{font-size:9px;letter-spacing:.14em;padding:3px 9px;border:1px solid rgba(92,191,176,.28);color:var(--teal-dim);font-family:'Cormorant Garamond',serif;}
.pc{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--muted);font-style:italic;}
.pf{padding:10px 24px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;}
.fb{font-size:9px;letter-spacing:.12em;padding:4px 10px;background:transparent;border:1px solid var(--muted);color:var(--muted);cursor:pointer;font-family:'Cormorant Garamond',serif;transition:all .2s;}
.fb:hover,.fb.on{border-color:var(--teal-dim);color:var(--teal);}
.pl{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--teal-dim) transparent;}
.pl::-webkit-scrollbar{width:3px;}
.pl::-webkit-scrollbar-thumb{background:var(--teal-dim);}
.ai{padding:18px 24px;border-bottom:1px solid rgba(92,191,176,.06);cursor:pointer;transition:background .18s;position:relative;}
.ai::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .2s;}
.ai:hover{background:rgba(92,191,176,.04);}
.ai:hover::before{background:var(--teal-dim);}
.at{font-size:9px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px;font-family:'Inter',sans-serif;}
.at.thread{color:#5b9bd5;}.at.analyse{color:var(--teal);}.at.macro{color:var(--gold);}.at.note{color:#a07cc5;}
.ati{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--txt);line-height:1.45;margin-bottom:7px;font-weight:400;}
.ae{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--txt2);line-height:1.6;margin-bottom:10px;}
.af{display:flex;justify-content:space-between;align-items:center;}
.ad{font-size:10px;color:var(--muted);letter-spacing:.06em;font-family:'Cormorant Garamond',serif;}
.al{font-size:10px;letter-spacing:.12em;color:var(--teal-dim);text-decoration:none;border-bottom:1px solid rgba(92,191,176,.3);padding-bottom:1px;transition:color .2s;font-family:'Cormorant Garamond',serif;}
.al:hover{color:var(--teal);}
.pe{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;text-align:center;}
.pe p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--muted);line-height:1.7;max-width:240px;}
.bclose{position:absolute;top:70px;right:12px;width:26px;height:26px;background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10;}
.bclose:hover{color:var(--teal);border-color:var(--teal-dim);}
.hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--muted);letter-spacing:.08em;pointer-events:none;transition:opacity .4s;white-space:nowrap;}
