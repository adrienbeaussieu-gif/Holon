<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLON — Géoéconomie</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080d12;--teal:#5cbfb0;--teal-dim:#3a8a7f;--teal-glow:rgba(92,191,176,0.12);--gold:#c9a96e;--txt:#e8e4dc;--txt2:#8fa0b0;--muted:#4a5a6a;--border:rgba(92,191,176,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Inter',sans-serif;font-weight:300;color:var(--txt);}
header{position:fixed;top:0;left:0;right:0;z-index:100;height:62px;background:linear-gradient(180deg,rgba(8,13,18,.98),rgba(8,13,18,.7));backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.lw{display:flex;align-items:center;gap:12px;}
.lt{font-family:'Cinzel',serif;font-size:18px;font-weight:600;letter-spacing:.28em;}
.ls{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.2em;color:var(--teal);font-style:italic;display:block;margin-top:1px;}
nav{display:flex;align-items:center;gap:18px;}
.nl{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.1em;color:var(--txt2);cursor:pointer;transition:color .2s;text-decoration:none;}
.nl:hover{color:var(--teal);}
.nc{border:1px solid var(--teal-dim);color:var(--teal);padding:5px 14px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;transition:all .25s;cursor:pointer;background:none;}
.nc:hover{background:var(--teal-glow);}
#map-wrap{position:fixed;inset:0;top:62px;overflow:hidden;background:var(--bg);}
#map-svg{width:100%;height:100%;cursor:grab;display:block;}
#map-svg:active{cursor:grabbing;}
.country{fill:#162434;stroke:#1a2e42;stroke-width:.3;cursor:pointer;transition:fill .15s,stroke .15s;}
.country:hover{fill:#1f3a52;stroke:rgba(92,191,176,.4);}
.country.has-data{fill:#183040;stroke:rgba(92,191,176,.25);}
.country.has-data:hover{fill:#1e4a62;stroke:rgba(92,191,176,.6);}
.country.active{fill:#14352f!important;stroke:#5cbfb0!important;stroke-width:.8;}
.graticule{fill:none;stroke:rgba(255,255,255,.03);stroke-width:.4;}
.sphere{fill:#050d14;}
.border{fill:none;stroke:rgba(92,191,176,.08);stroke-width:.3;}
.dot-g{cursor:pointer;}
#zoom-ctrl{position:fixed;bottom:24px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:50;}
.zb{width:32px;height:32px;background:rgba(8,13,18,.9);border:1px solid var(--border);color:var(--txt2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1;}
.zb:hover{border-color:var(--teal-dim);color:var(--teal);}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--muted);letter-spacing:.08em;pointer-events:none;transition:opacity .4s;white-space:nowrap;}
#tip{position:fixed;background:rgba(6,11,17,.96);border:1px solid var(--border);padding:6px 13px;font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:.04em;opacity:0;transition:opacity .12s;pointer-events:none;white-space:nowrap;z-index:200;}
#panel{position:fixed;right:0;top:62px;bottom:0;width:0;overflow:hidden;transition:width .38s cubic-bezier(.4,0,.2,1);background:rgba(7,12,18,.97);border-left:1px solid var(--border);z-index:150;backdrop-filter:blur(24px);}
#panel.open{width:min(380px,100vw);}
.pi{width:min(380px,100vw);height:100%;display:flex;flex-direction:column;}
.ph{padding:22px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pr{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.22em;color:var(--teal);text-transform:uppercase;margin-bottom:3px;}
.pn{font-family:'Cinzel',serif;font-size:17px;letter-spacing:.1em;font-weight:400;margin-bottom:8px;}
.pm{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.tag{font-size:9px;letter-spacing:.14em;padding:3px 9px;border:1px solid rgba(92,191,176,.28);color:var(--teal-dim);font-family:'Cormorant Garamond',serif;}
.pc{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--muted);font-style:italic;}
.pf{padding:9px 22px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;}
.fb{font-size:9px;letter-spacing:.12em;padding:4px 10px;background:transparent;border:1px solid var(--muted);color:var(--muted);cursor:pointer;font-family:'Cormorant Garamond',serif;transition:all .2s;}
.fb:hover,.fb.on{border-color:var(--teal-dim);color:var(--teal);}
.pl{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--teal-dim) transparent;}
.pl::-webkit-scrollbar{width:3px;}
.pl::-webkit-scrollbar-thumb{background:var(--teal-dim);}
.ai{padding:16px 22px;border-bottom:1px solid rgba(92,191,176,.06);transition:background .18s;position:relative;}
.ai::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .2s;}
.ai:hover{background:rgba(92,191,176,.04);}
.ai:hover::before{background:var(--teal-dim);}
.at{font-size:9px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px;font-family:'Inter',sans-serif;}
.at.thread{color:#5b9bd5;}.at.analyse{color:var(--teal);}.at.macro{color:var(--gold);}.at.note{color:#a07cc5;}
.ati{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--txt);line-height:1.45;margin-bottom:6px;font-weight:400;}
.ae{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--txt2);line-height:1.6;margin-bottom:9px;}
.af{display:flex;justify-content:space-between;align-items:center;}
.ad{font-size:10px;color:var(--muted);letter-spacing:.06em;font-family:'Cormorant Garamond',serif;}
.al{font-size:10px;letter-spacing:.12em;color:var(--teal-dim);text-decoration:none;border-bottom:1px solid rgba(92,191,176,.3);padding-bottom:1px;transition:color .2s;font-family:'Cormorant Garamond',serif;}
.al:hover{color:var(--teal);}
.pe{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;text-align:center;}
.pe p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--muted);line-height:1.7;max-width:220px;}
.bclose{position:absolute;top:70px;right:12px;width:26px;height:26px;background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10;}
.bclose:hover{color:var(--teal);border-color:var(--teal-dim);}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:300;transition:opacity .7s;}
.ld-logo{font-family:'Cinzel',serif;font-size:32px;letter-spacing:.35em;}
.ld-sub{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.22em;color:var(--teal);font-style:italic;}
.ld-bar{width:160px;height:1px;background:rgba(92,191,176,.12);overflow:hidden;}
.ld-fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal-dim),var(--teal));animation:bf 2s .2s ease-out forwards;}
@keyframes bf{to{width:100%;}}
</style>
</head>
<body>

<div id="loading">
  <svg width="54" height="46" viewBox="0 0 60 52" fill="none">
    <line x1="8" y1="42" x2="30" y2="10" stroke="#5cbfb0" stroke-width="1.3"/>
    <line x1="30" y1="10" x2="52" y2="20" stroke="#5cbfb0" stroke-width="1.3"/>
    <line x1="52" y1="20" x2="46" y2="42" stroke="#5cbfb0" stroke-width="1.3"/>
    <line x1="8" y1="42" x2="46" y2="42" stroke="#5cbfb0" stroke-width="1.3"/>
    <line x1="30" y1="10" x2="46" y2="42" stroke="rgba(92,191,176,.4)" stroke-width="1"/>
    <line x1="8" y1="42" x2="52" y2="20" stroke="rgba(92,191,176,.4)" stroke-width="1"/>
    <circle cx="8" cy="42" r="3.5" fill="#6a7a8a"/>
    <circle cx="30" cy="10" r="4.5" fill="#5cbfb0"/>
    <circle cx="52" cy="20" r="3.5" fill="#6a7a8a"/>
    <circle cx="46" cy="42" r="4.5" fill="#5cbfb0"/>
  </svg>
  <div class="ld-logo">HOLON</div>
  <div class="ld-sub">— Géoéconomie Mondiale —</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<header>
  <div class="lw">
    <svg width="38" height="32" viewBox="0 0 60 52" fill="none">
      <line x1="8" y1="42" x2="30" y2="10" stroke="#5cbfb0" stroke-width="1.3"/>
      <line x1="30" y1="10" x2="52" y2="20" stroke="#5cbfb0" stroke-width="1.3"/>
      <line x1="52" y1="20" x2="46" y2="42" stroke="#5cbfb0" stroke-width="1.3"/>
      <line x1="8" y1="42" x2="46" y2="42" stroke="#5cbfb0" stroke-width="1.3"/>
      <line x1="30" y1="10" x2="46" y2="42" stroke="rgba(92,191,176,.4)" stroke-width="1"/>
      <line x1="8" y1="42" x2="52" y2="20" stroke="rgba(92,191,176,.4)" stroke-width="1"/>
      <circle cx="8" cy="42" r="3" fill="#6a7a8a"/>
      <circle cx="30" cy="10" r="4" fill="#5cbfb0"/>
      <circle cx="52" cy="20" r="3" fill="#6a7a8a"/>
      <circle cx="46" cy="42" r="4" fill="#5cbfb0"/>
    </svg>
    <div><div class="lt">HOLON</div><span class="ls">— Géoéconomie —</span></div>
  </div>
  <nav>
    <a class="nl">Analyses</a>
    <a class="nl">Macro</a>
    <button class="nl nc">S'ABONNER</button>
  </nav>
</header>

<div id="map-wrap"><svg id="map-svg"></svg></div>

<div id="zoom-ctrl">
  <button class="zb" id="zin">+</button>
  <button class="zb" id="zout">−</button>
</div>

<div class="hint" id="hint">Pincez pour zoomer · cliquez sur un pays</div>
<div id="tip"></div>

<div id="panel">
  <div class="pi">
    <div class="ph">
      <div class="pr" id="pr">Région</div>
      <div class="pn" id="pn">—</div>
      <div class="pm"><div id="ptags"></div><div class="pc" id="pcount"></div></div>
    </div>
    <div class="pf">
      <button class="fb on" data-f="all">Tout</button>
      <button class="fb" data-f="analyse">Analyse</button>
      <button class="fb" data-f="thread">Thread</button>
      <button class="fb" data-f="macro">Macro</button>
      <button class="fb" data-f="note">Note</button>
    </div>
    <div class="pl" id="pl"></div>
  </div>
  <button class="bclose" id="pcl">✕</button>
</div>

<!-- Tout depuis unpkg — CDN le plus fiable sur mobile -->
<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>

<script>
window.onload = function() {

const DATA = {
  "United States of America":{region:"Amérique du Nord",tags:["Macro","Dollar"],lat:38,lon:-97,articles:[{type:"macro",title:"La fin du dollar roi ? Dédollarisation et recomposition du système monétaire",excerpt:"Les BRICS accélèrent leur stratégie de contournement du dollar.",date:"28 fév. 2025",url:"#"},{type:"analyse",title:"Fed vs inflation : le dilemme impossible de Powell",excerpt:"Entre stabilité des prix et risque de récession, la Fed navigue en territoire inconnu.",date:"14 fév. 2025",url:"#"},{type:"thread",title:"Thread : Les 10 graphiques qui expliquent l'économie américaine en 2025",excerpt:"Les données clés pour comprendre la trajectoire macro US.",date:"3 fév. 2025",url:"#"}]},
  "China":{region:"Asie-Pacifique",tags:["Géopolitique","Industrie"],lat:35,lon:103,articles:[{type:"analyse",title:"La stratégie économique de Xi : entre relance domestique et expansion extérieure",excerpt:"Comment Pékin articule sa politique industrielle avec ses ambitions géopolitiques.",date:"22 fév. 2025",url:"#"},{type:"thread",title:"Thread : Belt & Road Initiative — bilan d'une décennie",excerpt:"Qui a vraiment profité des nouvelles routes de la soie ?",date:"10 jan. 2025",url:"#"},{type:"macro",title:"Déflation chinoise : le Japon des années 90 comme miroir",excerpt:"Les parallèles troublants entre la stagnation japonaise et la Chine.",date:"5 jan. 2025",url:"#"},{type:"note",title:"Yuan digital et surveillance financière",excerpt:"Les implications géopolitiques du e-CNY.",date:"18 déc. 2024",url:"#"}]},
  "Russia":{region:"Eurasie",tags:["Sanctions","Énergie"],lat:61,lon:90,articles:[{type:"analyse",title:"L'économie de guerre russe : résilience ou illusion ?",excerpt:"Malgré les sanctions, la Russie affiche une croissance.",date:"25 fév. 2025",url:"#"},{type:"macro",title:"Pétrole russe : les routes de contournement des sanctions",excerpt:"Inde, Chine, Turquie — comment le brut russe continue de circuler.",date:"12 fév. 2025",url:"#"}]},
  "Saudi Arabia":{region:"Moyen-Orient",tags:["Pétrole","Vision 2030"],lat:24,lon:45,articles:[{type:"analyse",title:"Vision 2030 : l'Arabie Saoudite peut-elle vraiment se diversifier ?",excerpt:"MBS parie sur une transformation économique radicale.",date:"19 fév. 2025",url:"#"},{type:"thread",title:"Thread : L'OPEP+ est-il encore pertinent en 2025 ?",excerpt:"La cohésion du cartel mise à l'épreuve.",date:"8 jan. 2025",url:"#"}]},
  "Germany":{region:"Europe",tags:["Industrie","Énergie"],lat:51,lon:10,articles:[{type:"analyse",title:"Le modèle allemand en crise : la fin du Wirtschaftswunder ?",excerpt:"Désindustrialisation, crise énergétique et vieillissement démographique.",date:"20 fév. 2025",url:"#"},{type:"macro",title:"L'Europe face au choc tarifaire américain",excerpt:"Comment l'UE adapte sa stratégie commerciale.",date:"1 mars 2025",url:"#"}]},
  "France":{region:"Europe",tags:["Déficit","Souveraineté"],lat:46,lon:2,articles:[{type:"analyse",title:"La France en décrochage budgétaire : anatomie d'une crise annoncée",excerpt:"Avec un déficit à 6% du PIB, Paris dans le collimateur des marchés.",date:"2 mars 2025",url:"#"}]},
  "Brazil":{region:"Amérique du Sud",tags:["BRICS","Émergents"],lat:-10,lon:-53,articles:[{type:"analyse",title:"Lula III : ambitions sociales vs contraintes budgétaires",excerpt:"Le retour de Lula confronté à une dette publique croissante.",date:"15 fév. 2025",url:"#"},{type:"thread",title:"Thread : Le Brésil, pivot des BRICS en Amérique Latine",excerpt:"Comment Brasília joue sur plusieurs tableaux.",date:"20 jan. 2025",url:"#"}]},
  "India":{region:"Asie du Sud",tags:["Croissance","Géopolitique"],lat:20,lon:78,articles:[{type:"analyse",title:"L'Inde, nouveau centre de gravité économique mondial ?",excerpt:"1,4 milliard d'habitants et une croissance à 7%.",date:"24 fév. 2025",url:"#"},{type:"macro",title:"Roupie et souveraineté monétaire : la stratégie de Modi",excerpt:"L'Inde développe ses propres infrastructures de paiement.",date:"11 jan. 2025",url:"#"}]},
  "Turkey":{region:"Eurasie",tags:["Pivot","Inflation"],lat:38,lon:35,articles:[{type:"note",title:"La Turquie, pivot entre Orient et Occident — à quel prix ?",excerpt:"Erdogan navigue entre l'OTAN et les BRICS.",date:"6 fév. 2025",url:"#"}]},
  "Japan":{region:"Asie-Pacifique",tags:["Yen","Politique monétaire"],lat:36,lon:138,articles:[{type:"macro",title:"La BOJ sort de sa décennie de taux négatifs",excerpt:"Le pivot de la Banque du Japon envoie des ondes de choc.",date:"17 fév. 2025",url:"#"},{type:"analyse",title:"Le carry trade yen : la bombe à retardement des marchés",excerpt:"Des milliers de milliards empruntés en yen.",date:"28 jan. 2025",url:"#"}]},
  "South Africa":{region:"Afrique",tags:["BRICS","Émergents"],lat:-29,lon:25,articles:[{type:"analyse",title:"L'Afrique du Sud et les BRICS élargi : entre espoirs et désillusions",excerpt:"Les enjeux pour le continent africain.",date:"9 fév. 2025",url:"#"}]},
  "Iran":{region:"Moyen-Orient",tags:["Sanctions","Nucléaire"],lat:32,lon:53,articles:[{type:"analyse",title:"L'Iran dans l'axe Moscou-Pékin : une alliance de nécessité",excerpt:"Comment Téhéran s'intègre dans le nouvel ordre alternatif.",date:"7 fév. 2025",url:"#"}]},
  "Nigeria":{region:"Afrique",tags:["Pétrole","Démographie"],lat:9,lon:8,articles:[{type:"thread",title:"Thread : Le Nigeria en 2025 — la puissance africaine à la croisée des chemins",excerpt:"Démographie explosive, ressources pétrolières, instabilité politique.",date:"13 jan. 2025",url:"#"}]}
};

const N2N={4:"Afghanistan",8:"Albania",12:"Algeria",24:"Angola",32:"Argentina",36:"Australia",40:"Austria",50:"Bangladesh",56:"Belgium",64:"Bhutan",68:"Bolivia",76:"Brazil",100:"Bulgaria",104:"Myanmar",116:"Cambodia",120:"Cameroon",124:"Canada",152:"Chile",156:"China",170:"Colombia",178:"Republic of Congo",180:"Dem. Rep. Congo",188:"Costa Rica",192:"Cuba",203:"Czech Republic",208:"Denmark",214:"Dominican Republic",218:"Ecuador",818:"Egypt",222:"El Salvador",231:"Ethiopia",246:"Finland",250:"France",266:"Gabon",276:"Germany",288:"Ghana",300:"Greece",320:"Guatemala",332:"Haiti",340:"Honduras",356:"India",360:"Indonesia",364:"Iran",368:"Iraq",372:"Ireland",376:"Israel",380:"Italy",392:"Japan",400:"Jordan",398:"Kazakhstan",404:"Kenya",410:"South Korea",408:"North Korea",414:"Kuwait",418:"Laos",422:"Lebanon",434:"Libya",484:"Mexico",504:"Morocco",508:"Mozambique",516:"Namibia",528:"Netherlands",554:"New Zealand",566:"Nigeria",578:"Norway",586:"Pakistan",604:"Peru",608:"Philippines",616:"Poland",620:"Portugal",642:"Romania",643:"Russia",682:"Saudi Arabia",686:"Senegal",710:"South Africa",724:"Spain",729:"Sudan",728:"South Sudan",752:"Sweden",756:"Switzerland",760:"Syria",764:"Thailand",792:"Turkey",800:"Uganda",804:"Ukraine",784:"United Arab Emirates",826:"United Kingdom",840:"United States of America",858:"Uruguay",860:"Uzbekistan",862:"Venezuela",704:"Vietnam",887:"Yemen",894:"Zambia",716:"Zimbabwe"};

const mapWrap = document.getElementById('map-wrap');
const svg = d3.select('#map-svg');
const tip = document.getElementById('tip');
let W = mapWrap.clientWidth, H = mapWrap.clientHeight;
svg.attr('width', W).attr('height', H);

const projection = d3.geoNaturalEarth1().scale(W/6.5).translate([W/2, H/2]);
const pathGen = d3.geoPath().projection(projection);
const graticule = d3.geoGraticule().step([20,20]);

const mapG = svg.append('g');
mapG.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',pathGen);
mapG.append('path').datum(graticule()).attr('class','graticule').attr('d',pathGen);
const countryG = mapG.append('g');
const dotsG = mapG.append('g');

const zoom = d3.zoom().scaleExtent([1,10]).on('zoom', function(e){
  mapG.attr('transform', e.transform);
  const k = e.transform.k;
  dotsG.selectAll('circle.di').attr('r', 3.5/Math.sqrt(k));
  dotsG.selectAll('circle.do').attr('r', 7/Math.sqrt(k)).style('stroke-width', 1/k);
  countryG.selectAll('.country').style('stroke-width', 0.3/k);
});
svg.call(zoom);
document.getElementById('zin').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.5);
document.getElementById('zout').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.67);

// Un seul fetch, vers unpkg directement
fetch('https://unpkg.com/world-atlas@2/countries-110m.json')
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    const borders = topojson.mesh(world, world.objects.countries, (a,b) => a!==b);

    countryG.selectAll('path').data(countries.features).join('path')
      .attr('class', d => 'country'+(N2N[+d.id]&&DATA[N2N[+d.id]]?' has-data':''))
      .attr('d', pathGen)
      .on('mousemove', function(e,d){ const n=N2N[+d.id]; if(n) showTip(e.clientX,e.clientY,n); })
      .on('mouseleave', hideTip)
      .on('click', function(e,d){ const n=N2N[+d.id]; if(n){selectCountry(n,d3.select(this));e.stopPropagation();} });

    mapG.append('path').datum(borders).attr('class','border').attr('d',pathGen);

    Object.entries(DATA).forEach(([name,d]) => {
      const pos = projection([d.lon,d.lat]); if(!pos) return;
      const g = dotsG.append('g').attr('class','dot-g').attr('transform',`translate(${pos[0]},${pos[1]})`);
      g.append('circle').attr('class','do').attr('r',7).attr('fill','none').attr('stroke','rgba(92,191,176,.5)').attr('stroke-width',1);
      g.append('circle').attr('class','di').attr('r',3.5).attr('fill','#5cbfb0');
      g.on('mousemove', function(e){ showTip(e.clientX,e.clientY,name); e.stopPropagation(); })
       .on('mouseleave', hideTip)
       .on('click', function(e){ selectCountry(name,null); e.stopPropagation(); });
    });

    hideLoading();
  })
  .catch(() => hideLoading());

svg.on('click', closePanel);

function hideLoading(){
  const ld = document.getElementById('loading');
  ld.style.opacity='0';
  setTimeout(()=>ld.style.display='none', 700);
}

function showTip(mx,my,name){
  const d=DATA[name];
  tip.style.opacity='1'; tip.style.left=(mx+14)+'px'; tip.style.top=(my-10)+'px';
  tip.innerHTML=`<strong style="color:${d?'#5cbfb0':'#8fa0b0'}">${name}</strong>${d?` <span style="color:#4a5a6a;font-size:11px"> — ${d.articles.length} analyse${d.articles.length>1?'s':''}</span>`:''}`;
}
function hideTip(){ tip.style.opacity='0'; }

let curF='all', curD=null;
function selectCountry(name, pathEl){
  countryG.selectAll('.country').classed('active',false);
  if(pathEl) pathEl.classed('active',true);
  else countryG.selectAll('.country').filter(d=>N2N[+d.id]===name).classed('active',true);
  curD = DATA[name]||null;
  document.getElementById('pn').textContent = name;
  document.getElementById('pr').textContent = curD?curD.region:'—';
  document.getElementById('pcount').textContent = curD?`${curD.articles.length} analyse${curD.articles.length>1?'s':''}`:'';
  document.getElementById('ptags').innerHTML = curD?curD.tags.map(t=>`<span class="tag">${t}</span>`).join(''):'';
  renderList();
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity='0';
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  countryG.selectAll('.country').classed('active',false);
  document.getElementById('hint').style.opacity='1';
}
function renderList(){
  const el=document.getElementById('pl');
  if(!curD){el.innerHTML='<div class="pe"><p>Aucune analyse disponible pour cette zone.</p></div>';return;}
  const items=curF==='all'?curD.articles:curD.articles.filter(a=>a.type===curF);
  if(!items.length){el.innerHTML='<div class="pe"><p>Aucune analyse de ce type.</p></div>';return;}
  el.innerHTML=items.map(a=>`<div class="ai"><div class="at ${a.type}">${a.type.toUpperCase()}</div><div class="ati">${a.title}</div><div class="ae">${a.excerpt}</div><div class="af"><span class="ad">${a.date}</span><a href="${a.url}" class="al">Lire →</a></div></div>`).join('');
}
document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); curF=b.dataset.f; renderList();
  });
});
document.getElementById('pcl').addEventListener('click', closePanel);

window.addEventListener('resize',()=>{
  W=mapWrap.clientWidth; H=mapWrap.clientHeight;
  svg.attr('width',W).attr('height',H);
  projection.scale(W/6.5).translate([W/2,H/2]);
  mapG.selectAll('path').attr('d',pathGen);
  Object.entries(DATA).forEach(([name,d])=>{
    const pos=projection([d.lon,d.lat]); if(!pos) return;
    dotsG.selectAll('.dot-g').filter(function(){ return d3.select(this).attr('data-name')===name; }).attr('transform',`translate(${pos[0]},${pos[1]})`);
  });
});

}; // fin window.onload
