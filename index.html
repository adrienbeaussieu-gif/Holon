<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLON — Géoéconomie</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080d12;--teal:#5cbfb0;--teal-dim:#3a8a7f;--teal-glow:rgba(92,191,176,0.12);--gold:#c9a96e;--txt:#e8e4dc;--txt2:#8fa0b0;--muted:#4a5a6a;--border:rgba(92,191,176,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Inter',sans-serif;font-weight:300;color:var(--txt);}
header{position:fixed;top:0;left:0;right:0;z-index:100;height:62px;background:linear-gradient(180deg,rgba(8,13,18,.98),rgba(8,13,18,.7));backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.lw{display:flex;align-items:center;gap:12px;}
.lt{font-family:'Cinzel',serif;font-size:18px;font-weight:600;letter-spacing:.28em;}
.ls{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.2em;color:var(--teal);font-style:italic;display:block;margin-top:1px;}
nav{display:flex;align-items:center;gap:18px;}
.nl{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.1em;color:var(--txt2);cursor:pointer;transition:color .2s;text-decoration:none;}
.nl:hover{color:var(--teal);}
.nc{border:1px solid var(--teal-dim);color:var(--teal);padding:5px 14px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;transition:all .25s;cursor:pointer;background:none;}
.nc:hover{background:var(--teal-glow);}
#map-wrap{position:fixed;inset:0;top:62px;overflow:hidden;background:var(--bg);}
#map-svg{width:100%;height:100%;cursor:grab;display:block;}
#map-svg:active{cursor:grabbing;}
.country{fill:#162434;stroke:#1a2e42;stroke-width:.3;cursor:pointer;transition:fill .15s,stroke .15s;}
.country:hover{fill:#1f3a52;stroke:rgba(92,191,176,.4);}
.country.has-data{fill:#183040;stroke:rgba(92,191,176,.25);}
.country.has-data:hover{fill:#1e4a62;stroke:rgba(92,191,176,.6);}
.country.active{fill:#14352f!important;stroke:#5cbfb0!important;stroke-width:.8;}
.graticule{fill:none;stroke:rgba(255,255,255,.03);stroke-width:.4;}
.sphere{fill:#050d14;}
.border{fill:none;stroke:rgba(92,191,176,.08);stroke-width:.3;}
.dot-g{cursor:pointer;}
#zoom-ctrl{position:fixed;bottom:24px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:50;}
.zb{width:32px;height:32px;background:rgba(8,13,18,.9);border:1px solid var(--border);color:var(--txt2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1;}
.zb:hover{border-color:var(--teal-dim);color:var(--teal);}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--muted);letter-spacing:.08em;pointer-events:none;transition:opacity .4s;white-space:nowrap;}
#tip{position:fixed;background:rgba(6,11,17,.96);border:1px solid var(--border);padding:6px 13px;font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:.04em;opacity:0;transition:opacity .12s;pointer-events:none;white-space:nowrap;z-index:200;}
#panel{position:fixed;right:0;top:62px;bottom:0;width:0;overflow:hidden;transition:width .38s cubic-bezier(.4,0,.2,1);background:rgba(7,12,18,.97);border-left:1px solid var(--border);z-index:150;backdrop-filter:blur(24px);}
#panel.open{width:min(380px,100vw);}
.pi{width:min(380px,100vw);height:100%;display:flex;flex-direction:column;}
.ph{padding:22px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pr{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.22em;color:var(--teal);text-transform:uppercase;margin-bottom:3px;}
.pn{font-family:'Cinzel',serif;font-size:17px;letter-spacing:.1em;font-weight:400;margin-bottom:8px;}
.pm{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.tag{font-size:9px;letter-spacing:.14em;padding:3px 9px;border:1px solid rgba(92,191,176,.28);color:var(--teal-dim);font-family:'Cormorant Garamond',serif;}
.pc{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--muted);font-style:italic;}
.pf{padding:9px 22px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;}
.fb{font-size:9px;letter-spacing:.12em;padding:4px 10px;background:transparent;border:1px solid var(--muted);color:var(--muted);cursor:pointer;font-family:'Cormorant Garamond',serif;transition:all .2s;}
.fb:hover,.fb.on{border-color:var(--teal-dim);color:var(--teal);}
.pl{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--teal-dim) transparent;}
.pl::-webkit-scrollbar{width:3px;}
.pl::-webkit-scrollbar-thumb{background:var(--teal-dim);}
.ai{padding:16px 22px;border-bottom:1px solid rgba(92,191,176,.06);transition:background .18s;position:relative;}
.ai::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .2s;}
.ai:hover{background:rgba(92,191,176,.04);}
.ai:hover::before{background:var(--teal-dim);}
.at{font-size:9px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px;font-family:'Inter',sans-serif;}
.at.thread{color:#5b9bd5;}.at.analyse{color:var(--teal);}.at.macro{color:var(--gold);}.at.note{color:#a07cc5;}
.ati{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--txt);line-height:1.45;margin-bottom:6px;font-weight:400;}
.ae{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--txt2);line-height:1.6;margin-bottom:9px;}
.af{display:flex;justify-content:space-between;align-items:center;}
.ad{font-size:10px;color:var(--muted);letter-spacing:.06em;font-family:'Cormorant Garamond',serif;}
.al{font-size:10px;letter-spacing:.12em;color:var(--teal-dim);text-decoration:none;border-bottom:1px solid rgba(92,191,176,.3);padding-bottom:1px;transition:color .2s;font-family:'Cormorant Garamond',serif;}
.al:hover{color:var(--teal);}
.pe{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;text-align:center;}
.pe p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--muted);line-height:1.7;max-width:220px;}
.bclose{position:absolute;top:70px;right:12px;width:26px;height:26px;background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10;}
.bclose:hover{color:var(--teal);border-color:var(--teal-dim);}
.rzone{cursor:pointer;transition:opacity .2s;}
.rzone:hover{opacity:1!important;}
.country.pivot-country{fill:#1c2e3a;stroke:rgba(200,160,80,.2);}
.country.pivot-country.has-data{fill:#1e3040;}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:300;transition:opacity .7s;}
.ld-logo{font-family:'Cinzel',serif;font-size:32px;letter-spacing:.35em;}
.ld-sub{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.22em;color:var(--teal);font-style:italic;}
.ld-bar{width:160px;height:1px;background:rgba(92,191,176,.12);overflow:hidden;}
.ld-fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal-dim),var(--teal));animation:bf 2s .2s ease-out forwards;}
@keyframes bf{to{width:100%;}}
/* ADMIN */
#admin-overlay{display:none;position:fixed;inset:0;background:rgba(4,8,13,.92);z-index:500;backdrop-filter:blur(8px);}
#admin-overlay.open{display:flex;align-items:center;justify-content:center;}
#admin-box{background:#0c1520;border:1px solid rgba(92,191,176,.25);width:min(720px,96vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.adm-hd{padding:18px 22px;border-bottom:1px solid rgba(92,191,176,.15);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.adm-hd h2{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.25em;color:var(--teal);}
.adm-hd span{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--muted);font-style:italic;}
.adm-close{background:none;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.adm-close:hover{color:var(--teal);border-color:var(--teal-dim);}
.adm-body{display:flex;flex:1;overflow:hidden;}
.adm-left{width:200px;flex-shrink:0;border-right:1px solid rgba(92,191,176,.1);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--teal-dim) transparent;}
.adm-country-item{padding:9px 16px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--txt2);border-bottom:1px solid rgba(92,191,176,.05);transition:all .15s;}
.adm-country-item:hover{background:rgba(92,191,176,.05);color:var(--txt);}
.adm-country-item.sel{background:rgba(92,191,176,.08);color:var(--teal);border-left:2px solid var(--teal);}
.adm-right{flex:1;overflow-y:auto;padding:18px 20px;scrollbar-width:thin;scrollbar-color:var(--teal-dim) transparent;}
.adm-section-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;color:var(--teal);margin-bottom:12px;}
.adm-article{background:rgba(255,255,255,.03);border:1px solid rgba(92,191,176,.1);padding:12px 14px;margin-bottom:10px;position:relative;}
.adm-article-title{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--txt);margin-bottom:4px;}
.adm-article-meta{font-size:10px;color:var(--muted);font-family:'Cormorant Garamond',serif;}
.adm-article-actions{position:absolute;top:10px;right:10px;display:flex;gap:6px;}
.adm-btn-sm{background:none;border:1px solid var(--border);color:var(--muted);font-size:10px;padding:2px 8px;cursor:pointer;font-family:'Cormorant Garamond',serif;transition:all .15s;}
.adm-btn-sm:hover{color:var(--teal);border-color:var(--teal-dim);}
.adm-btn-sm.del:hover{color:#e05555;border-color:#e05555;}
.adm-add-btn{width:100%;padding:9px;background:none;border:1px dashed rgba(92,191,176,.25);color:var(--teal-dim);font-family:'Cormorant Garamond',serif;font-size:12px;cursor:pointer;letter-spacing:.1em;transition:all .2s;margin-top:4px;}
.adm-add-btn:hover{border-color:var(--teal);color:var(--teal);}
.adm-form{background:rgba(92,191,176,.04);border:1px solid rgba(92,191,176,.15);padding:16px;margin-top:12px;}
.adm-form label{display:block;font-size:9px;letter-spacing:.15em;color:var(--muted);margin-bottom:4px;font-family:'Inter',sans-serif;}
.adm-form input,.adm-form textarea,.adm-form select{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(92,191,176,.15);color:var(--txt);font-family:'Cormorant Garamond',serif;font-size:13px;padding:7px 10px;margin-bottom:12px;outline:none;}
.adm-form input:focus,.adm-form textarea:focus,.adm-form select:focus{border-color:var(--teal-dim);}
.adm-form textarea{height:70px;resize:vertical;}
.adm-form select option{background:#0c1520;}
.adm-form-actions{display:flex;gap:8px;justify-content:flex-end;}
.adm-btn{padding:7px 18px;background:none;border:1px solid var(--teal-dim);color:var(--teal);font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;cursor:pointer;transition:all .2s;}
.adm-btn:hover{background:var(--teal-glow);}
.adm-btn.cancel{border-color:var(--muted);color:var(--muted);}
.adm-btn.cancel:hover{border-color:var(--txt2);color:var(--txt2);}
.adm-export{padding:14px 20px;border-top:1px solid rgba(92,191,176,.1);flex-shrink:0;display:flex;align-items:center;gap:10px;}
.adm-export-note{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--muted);font-style:italic;flex:1;}
</style>
</head>

<script>
window.onload = function() {

const DATA = {

  "United States of America":{region:"Amérique du Nord",tags:["Géopolitique","Dollar","Protectionnisme"],lat:38,lon:-97,articles:[
    {type:"macro",title:"Monde fragmenté 2026 : l'hypothèse cadre",excerpt:"Multipolarité croissante, domination US contestée, dédollarisation lente, coût du capital structurellement plus élevé. Les fondements du portefeuille global changent.",date:"1 mars 2026",url:"#"},
    {type:"analyse",title:"La fin du néolibéralisme américain : rupture ou pause ?",excerpt:"Retrait des accords multilatéraux, tarifs agressifs, sécurisation industrielle — Trump ou pas, la politique américaine a changé de logiciel. Les mécanismes de marché restent, le consensus de Washington non.",date:"15 fév. 2026",url:"#"},
    {type:"macro",title:"Dédollarisation : érosion lente, pas effondrement",excerpt:"La part du dollar dans les réserves mondiales recule graduellement. Pas de rupture systémique, mais une multipolarité monétaire qui s'installe. Implication : diversifier FX, sous-pondérer USD structurellement.",date:"28 fév. 2026",url:"#"},
    {type:"analyse",title:"Découplage US-Chine : le vrai coût pour les portefeuilles",excerpt:"Les barrières technologiques et tarifaires sont réelles et progressives. Les supply chains se segmentent. Prime de risque géopolitique inévitable sur les actifs exposés.",date:"10 fév. 2026",url:"#"},
    {type:"thread",title:"Thread : Fed, inflation, taux — le nouveau régime macro",excerpt:"L'environnement post-2020 est structurellement différent : inflation modérée mais persistante, taux plus élevés qu'avant. Cohérent avec une fragmentation qui renchérit les coûts. Actions positives mais dispersion sectorielle élevée.",date:"3 fév. 2026",url:"#"}
  ]},

  "China":{region:"Asie-Pacifique",tags:["Géopolitique","Semi-conducteurs","Découplage"],lat:35,lon:103,articles:[
    {type:"analyse",title:"Autosuffisance technologique : la grande ambition de Xi",excerpt:"Pékin investit massivement pour s'affranchir des dépendances occidentales en semi-conducteurs, IA et énergie. Un pari de long terme aux implications géopolitiques majeures.",date:"22 fév. 2026",url:"#"},
    {type:"macro",title:"Déflation chinoise : le piège japonais est-il inévitable ?",excerpt:"Les parallèles avec le Japon des années 90 sont troublants : bulle immobilière dégonflée, consommation atone, excès de capacités industrielles. Le scénario de la décennie perdue est sur la table.",date:"5 fév. 2026",url:"#"},
    {type:"analyse",title:"Taiwan : pourquoi l'invasion reste improbable à court terme",excerpt:"L'interconnexion industrielle rend un conflit extraordinairement coûteux pour Pékin — en particulier sans garantie sur les semi-conducteurs. Les escalades asymétriques restent le scénario central.",date:"14 jan. 2026",url:"#"},
    {type:"thread",title:"Thread : Belt & Road — bilan d'une décennie de soft power",excerpt:"Qui a vraiment profité des nouvelles routes de la soie ? La réponse est plus nuancée qu'attendu.",date:"10 jan. 2026",url:"#"}
  ]},

  "Russia":{region:"Eurasie",tags:["Guerre","Sanctions","Énergie"],lat:61,lon:90,articles:[
    {type:"analyse",title:"L'économie de guerre russe : jusqu'où peut-elle tenir ?",excerpt:"Malgré les sanctions, la Russie affiche une croissance dopée par les dépenses militaires. Mais les déséquilibres s'accumulent : inflation, pénurie de main-d'oeuvre, dépendance aux hydrocarbures.",date:"25 fév. 2026",url:"#"},
    {type:"macro",title:"Pétrole russe : les routes de contournement persistent",excerpt:"Inde, Chine, Turquie — le brut russe continue de circuler via des circuits alternatifs. Les sanctions ont redirigé les flux, pas supprimé les revenus.",date:"12 fév. 2026",url:"#"},
    {type:"note",title:"Russie post-guerre : quel scénario de sortie ?",excerpt:"Quel que soit le dénouement du conflit ukrainien, la Russie sort isolée de l'Occident pour une génération. Son ancrage dans l'axe Chine-Iran redessine la géopolitique eurasiatique.",date:"1 fév. 2026",url:"#"}
  ]},

  "Ukraine":{region:"Europe de l'Est",tags:["Guerre","Reconstruction","Pivot"],lat:49,lon:31,articles:[
    {type:"analyse",title:"Ukraine, pivot de l'échiquier mondial — Brzezinski avait raison",excerpt:"Dans Le Grand Échiquier, Brzezinski identifiait l'Ukraine comme pivot géopolitique absolu. Le conflit en cours le confirme : qui contrôle l'Ukraine oriente l'architecture sécuritaire de l'Europe entière.",date:"20 fév. 2026",url:"#"},
    {type:"macro",title:"Reconstruction ukrainienne : le plus grand chantier d'Europe depuis 1945",excerpt:"Les besoins de reconstruction sont estimés à 500 Mds USD. Un enjeu d'investissement massif, mais conditionné à la stabilisation politique et à l'intégration européenne.",date:"15 fév. 2026",url:"#"},
    {type:"thread",title:"Thread : Ukraine dans l'UE — calendrier, obstacles, implications",excerpt:"Le processus d'adhésion avance plus vite que prévu. Quelles implications pour les fonds structurels, l'agriculture européenne et l'équilibre politique de l'UE ?",date:"5 jan. 2026",url:"#"}
  ]},

  "Poland":{region:"Europe de l'Est",tags:["OTAN","Pivot","Défense"],lat:52,lon:20,articles:[

const mapWrap = document.getElementById('map-wrap');
const svg = d3.select('#map-svg');
const tip = document.getElementById('tip');
let W = mapWrap.clientWidth, H = mapWrap.clientHeight;
svg.attr('width', W).attr('height', H);

const projection = d3.geoNaturalEarth1().scale(W/6.5).translate([W/2, H/2]);
const pathGen = d3.geoPath().projection(projection);
const graticule = d3.geoGraticule().step([20,20]);

const mapG = svg.append('g');
mapG.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',pathGen);
mapG.append('path').datum(graticule()).attr('class','graticule').attr('d',pathGen);
const countryG = mapG.append('g');
const dotsG = mapG.append('g');

const zoom = d3.zoom().scaleExtent([1,10]).on('zoom', function(e){
  mapG.attr('transform', e.transform);
  const k = e.transform.k;
  dotsG.selectAll('circle.di').attr('r', 3.5/Math.sqrt(k));
  dotsG.selectAll('circle.do').attr('r', 7/Math.sqrt(k)).style('stroke-width', 1/k);
  countryG.selectAll('.country').style('stroke-width', 0.3/k);
});
svg.call(zoom);
document.getElementById('zin').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.5);
document.getElementById('zout').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.67);

// Un seul fetch, vers unpkg directement
fetch('https://unpkg.com/world-atlas@2/countries-110m.json')
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    const borders = topojson.mesh(world, world.objects.countries, (a,b) => a!==b);

    countryG.selectAll('path').data(countries.features).join('path')
      .attr('class', d => 'country'+(N2N[+d.id]&&DATA[N2N[+d.id]]?' has-data':''))
      .attr('d', pathGen)
      .on('mousemove', function(e,d){ const n=N2N[+d.id]; if(n) showTip(e.clientX,e.clientY,n); })
      .on('mouseleave', hideTip)
      .on('click', function(e,d){ const n=N2N[+d.id]; if(n){selectCountry(n,d3.select(this));e.stopPropagation();} });

    mapG.append('path').datum(borders).attr('class','border').attr('d',pathGen);

    Object.entries(DATA).forEach(([name,d]) => {
      const pos = projection([d.lon,d.lat]); if(!pos) return;
      const g = dotsG.append('g').attr('class','dot-g').attr('transform',`translate(${pos[0]},${pos[1]})`);
      g.append('circle').attr('class','do').attr('r',7).attr('fill','none').attr('stroke','rgba(92,191,176,.5)').attr('stroke-width',1);
      g.append('circle').attr('class','di').attr('r',3.5).attr('fill','#5cbfb0');
      g.on('mousemove', function(e){ showTip(e.clientX,e.clientY,name); e.stopPropagation(); })
       .on('mouseleave', hideTip)
       .on('click', function(e){ selectCountry(name,null); e.stopPropagation(); });
    });

    // Pays pivots — légère teinte dorée sur les pays "Puissance moyenne"
    const PIVOTS = ["Turkey","India","Saudi Arabia"];
    countryG.selectAll('path').each(function(d){
      const name = N2N[+d.id];
      if(PIVOTS.includes(name)) d3.select(this).classed('pivot-country', true);
    });

    // Zones ressources
    const zonesG = mapG.insert('g', ':first-child').attr('id','zones-g');

    // Defs pour hachures
    const defs = svg.select('defs').empty() ? svg.append('defs') : svg.select('defs');
    const hatch = defs.append('pattern').attr('id','hatch-res').attr('patternUnits','userSpaceOnUse').attr('width',6).attr('height',6).attr('patternTransform','rotate(45)');
    hatch.append('line').attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',6).attr('stroke','rgba(200,140,60,0.18)').attr('stroke-width',1.5);

    const hatch2 = defs.append('pattern').attr('id','hatch-rare').attr('patternUnits','userSpaceOnUse').attr('width',6).attr('height',6).attr('patternTransform','rotate(45)');
    hatch2.append('line').attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',6).attr('stroke','rgba(160,100,220,0.2)').attr('stroke-width',1.5);

    RESOURCE_ZONES.forEach(zone => {
      const hatchId = zone.id === 'terres-rares' ? 'hatch-rare' : 'hatch-res';
      zone.features.forEach(feat => {
        zonesG.append('path')
          .datum(feat)
          .attr('class','rzone')
          .attr('d', pathGen)
          .attr('fill', `url(#${hatchId})`)
          .attr('stroke', zone.stroke)
          .attr('stroke-width', 0.6)
          .attr('opacity', 0.85)
          .on('mousemove', function(e){ showTipZone(e.clientX, e.clientY, zone.label); e.stopPropagation(); })
          .on('mouseleave', hideTip)
          .on('click', function(e){ selectZone(zone); e.stopPropagation(); });
      });
    });

    hideLoading();
  })
  .catch(() => hideLoading());

svg.on('click', closePanel);

function hideLoading(){
  const ld = document.getElementById('loading');
  ld.style.opacity='0';
  setTimeout(()=>ld.style.display='none', 700);
}

function showTipZone(mx,my,label){
  tip.style.opacity='1'; tip.style.left=(mx+14)+'px'; tip.style.top=(my-10)+'px';
  tip.innerHTML=`<strong style="color:#c87840">${label}</strong>`;
}
function selectZone(zone){
  countryG.selectAll('.country').classed('active',false);
  curD = {region:"Ressources critiques", tags:[zone.type], articles: zone.articles};
  document.getElementById('pn').textContent = zone.label;
  document.getElementById('pr').textContent = "Ressources critiques";
  document.getElementById('pcount').textContent = `${zone.articles.length} analyses`;
  document.getElementById('ptags').innerHTML = `<span class="tag" style="border-color:rgba(200,140,60,.4);color:#c87840">${zone.id==='terres-rares'?'Terres rares':'Hydrocarbures'}</span>`;
  renderList();
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity='0';
}
function showTip(mx,my,name){
  const d=DATA[name];
  tip.style.opacity='1'; tip.style.left=(mx+14)+'px'; tip.style.top=(my-10)+'px';
  tip.innerHTML=`<strong style="color:${d?'#5cbfb0':'#8fa0b0'}">${name}</strong>${d?` <span style="color:#4a5a6a;font-size:11px"> — ${d.articles.length} analyse${d.articles.length>1?'s':''}</span>`:''}`;
}
function hideTip(){ tip.style.opacity='0'; }

let curF='all', curD=null;
function selectCountry(name, pathEl){
  countryG.selectAll('.country').classed('active',false);
  if(pathEl) pathEl.classed('active',true);
  else countryG.selectAll('.country').filter(d=>N2N[+d.id]===name).classed('active',true);
  curD = DATA[name]||null;
  document.getElementById('pn').textContent = name;
  document.getElementById('pr').textContent = curD?curD.region:'—';
  document.getElementById('pcount').textContent = curD?`${curD.articles.length} analyse${curD.articles.length>1?'s':''}`:'';
  document.getElementById('ptags').innerHTML = curD?curD.tags.map(t=>`<span class="tag">${t}</span>`).join(''):'';
  renderList();
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity='0';
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  countryG.selectAll('.country').classed('active',false);
  document.getElementById('hint').style.opacity='1';
}
function renderList(){
  const el=document.getElementById('pl');
  if(!curD){el.innerHTML='<div class="pe"><p>Aucune analyse disponible pour cette zone.</p></div>';return;}
  const items=curF==='all'?curD.articles:curD.articles.filter(a=>a.type===curF);
  if(!items.length){el.innerHTML='<div class="pe"><p>Aucune analyse de ce type.</p></div>';return;}
  el.innerHTML=items.map(a=>`<div class="ai"><div class="at ${a.type}">${a.type.toUpperCase()}</div><div class="ati">${a.title}</div><div class="ae">${a.excerpt}</div><div class="af"><span class="ad">${a.date}</span><a href="${a.url}" class="al">Lire →</a></div></div>`).join('');
}
document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); curF=b.dataset.f; renderList();
  });
});
document.getElementById('pcl').addEventListener('click', closePanel);

window.addEventListener('resize',()=>{
  W=mapWrap.clientWidth; H=mapWrap.clientHeight;
  svg.attr('width',W).attr('height',H);
  projection.scale(W/6.5).translate([W/2,H/2]);
  mapG.selectAll('path').attr('d',pathGen);
  Object.entries(DATA).forEach(([name,d])=>{
    const pos=projection([d.lon,d.lat]); if(!pos) return;
    dotsG.selectAll('.dot-g').filter(function(){ return d3.select(this).attr('data-name')===name; }).attr('transform',`translate(${pos[0]},${pos[1]})`);
  });
});

}; // fin window.onload

// ══════════════════════════════════════════════════════
// ADMIN — tout en scope global
// ══════════════════════════════════════════════════════
var admSelCountry = null;
var admEditIdx = null;
var admUnlocked = false;
var admSeq = '';

document.addEventListener('keydown', function(e){
  admSeq = (admSeq + e.key).slice(-5);
  if(admSeq === 'holon'){
    admUnlocked = true;
    admSeq = '';
    document.getElementById('adm-export-btn').style.display = '';
    document.getElementById('adm-export-note').textContent = 'Modifications actives immédiatement. Exportez pour sauvegarder.';
    admRenderRight();
  }
});

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('logo-wrap').addEventListener('dblclick', function(){
    var o = document.getElementById('admin-overlay');
    o.classList.toggle('open');
    if(o.classList.contains('open')) admRenderCountryList();
  });
  document.getElementById('adm-close').addEventListener('click', function(){
    document.getElementById('admin-overlay').classList.remove('open');
  });
  document.getElementById('adm-export-btn').addEventListener('click', function(){
    var json = JSON.stringify(DATA, null, 2);
    var blob = new Blob(['const DATA = ' + json + ';'], {type:'text/javascript'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'data.js';
    a.click();
  });
});

function admRenderCountryList(){
  var el = document.getElementById('adm-country-list');
  el.innerHTML = Object.keys(DATA).sort().map(function(name){
    return '<div class="adm-country-item' + (name===admSelCountry?' sel':'') + '" data-name="' + name + '">' + name + '</div>';
  }).join('');
  el.querySelectorAll('.adm-country-item').forEach(function(item){
    item.addEventListener('click', function(){
      admSelCountry = item.dataset.name;
      admEditIdx = null;
      admRenderCountryList();
      admRenderRight();
    });
  });
}

function admRenderRight(){
  var el = document.getElementById('adm-right');
  if(!el) return;
  if(!admSelCountry){
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:\'Cormorant Garamond\',serif;font-style:italic;color:var(--muted);font-size:14px;">Sélectionnez un pays</div>';
    return;
  }
  var d = DATA[admSelCountry];
  var articles = d ? d.articles : [];
  var html = '<div class="adm-section-title">' + admSelCountry.toUpperCase() + ' — ' + articles.length + ' article' + (articles.length>1?'s':'') + '</div>';

  articles.forEach(function(a, i){
    html += '<div class="adm-article">'
      + '<div class="adm-article-title">' + a.title + '</div>'
      + '<div class="adm-article-meta">' + a.type.toUpperCase() + ' · ' + a.date + '</div>'
      + (admUnlocked ? '<div class="adm-article-actions">'
          + '<button class="adm-btn-sm" onclick="admEditArticle(' + i + ')">Modifier</button>'
          + '<button class="adm-btn-sm del" onclick="admDeleteArticle(' + i + ')">Supprimer</button>'
          + '</div>' : '')
      + '</div>';
  });

  if(admUnlocked){
    html += '<button class="adm-add-btn" onclick="admNewArticle()">+ Nouvel article</button>';
  }

  if(admEditIdx !== null){
    var a = admEditIdx === 'new' ? {type:'analyse',title:'',excerpt:'',date:'',url:'#'} : articles[admEditIdx];
    if(a){
      html += '<div class="adm-form" id="adm-form">'
        + '<label>TYPE</label>'
        + '<select id="af-type">'
        + '<option value="analyse"' + (a.type==='analyse'?' selected':'') + '>Analyse</option>'
        + '<option value="macro"' + (a.type==='macro'?' selected':'') + '>Macro</option>'
        + '<option value="thread"' + (a.type==='thread'?' selected':'') + '>Thread</option>'
        + '<option value="note"' + (a.type==='note'?' selected':'') + '>Note</option>'
        + '</select>'
        + '<label>TITRE</label>'
        + '<input id="af-title" type="text" value="' + (a.title||'').replace(/"/g,'&quot;') + '">'
        + '<label>EXTRAIT</label>'
        + '<textarea id="af-excerpt">' + (a.excerpt||'') + '</textarea>'
        + '<label>DATE</label>'
        + '<input id="af-date" type="text" value="' + (a.date||'') + '">'
        + '<label>URL</label>'
        + '<input id="af-url" type="text" value="' + (a.url||'#') + '">'
        + '<div class="adm-form-actions">'
        + '<button class="adm-btn cancel" onclick="admCancelEdit()">Annuler</button>'
        + '<button class="adm-btn" onclick="admSaveArticle()">Enregistrer</button>'
        + '</div></div>';
    }
  }

  el.innerHTML = html;
  if(admEditIdx !== null) setTimeout(function(){ var f=document.getElementById('adm-form'); if(f) f.scrollIntoView({behavior:'smooth'}); }, 50);
}

function admEditArticle(i){ admEditIdx=i; admRenderRight(); }
function admNewArticle(){ admEditIdx='new'; admRenderRight(); }
function admCancelEdit(){ admEditIdx=null; admRenderRight(); }

function admDeleteArticle(i){
  if(!confirm('Supprimer cet article ?')) return;
  DATA[admSelCountry].articles.splice(i, 1);
  admEditIdx = null;
  admRenderRight();
}

function admSaveArticle(){
  var art = {
    type: document.getElementById('af-type').value,
    title: document.getElementById('af-title').value.trim(),
    excerpt: document.getElementById('af-excerpt').value.trim(),
    date: document.getElementById('af-date').value.trim(),
    url: document.getElementById('af-url').value.trim() || '#'
  };
  if(!art.title){ alert('Le titre est obligatoire.'); return; }
  if(!DATA[admSelCountry]) DATA[admSelCountry] = {region:'',tags:[],lat:0,lon:0,articles:[]};
  if(admEditIdx === 'new'){
    DATA[admSelCountry].articles.push(art);
  } else {
    DATA[admSelCountry].articles[admEditIdx] = art;
  }
  admEditIdx = null;
  admRenderRight();
}

</script>
